version: "3.9"

services:
  nanobot:
    image: ghcr.io/chonsong/agent-os:latest
    container_name: agent-os-nanobot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8900:8900"
      - "127.0.0.1:9120:9120"
      - "127.0.0.1:8901:8901"
    environment:
      NANOBOT_WORKSPACE: /workspace
      MINIMAX_API_BASE: https://api.minimax.chat
      DATABASE_URL: postgresql://agentos:agentos_secure_pg_pass_2026@postgres:5432/agentos
    volumes:
      - nanobot-workspace:/workspace
      - /home/sean/.nanobot:/root/.nanobot:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agent-net

  postgres:
    image: postgres:16-alpine
    container_name: agent-os-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_secure_pg_pass_2026
      POSTGRES_DB: agentos
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: agent-os-cloudflared
    restart: unless-stopped
    command: tunnel run --token-file /etc/cloudflared/agent-os-argo-token.txt --url http://nanobot:8900
    volumes:
      - /home/sean/.cloudflared/agent-os-argo-token.txt:/etc/cloudflared/agent-os-argo-token.txt:ro
    networks:
      - agent-net
    depends_on:
      nanobot:
        condition: service_healthy

networks:
  agent-net:
    driver: bridge

volumes:
  nanobot-workspace:
  postgres-data:
