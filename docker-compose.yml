---
# agent-os — nanobot agent core + hermes dashboard
services:
  # ── nanobot agent core (OpenAI-compatible API on :8900) ──────────────
  nanobot:
    build:
      context: .
      dockerfile: Dockerfile.nanobot
    container_name: agent-os-nanobot
    restart: unless-stopped
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_KEYB=${MINIMAX_API_KEYB}
    volumes:
      - nanobot-workspace:/opt/data/home/.nanobot/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    expose:
      - "8900"

  # ── hermes dashboard (React UI + gateway) ──────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: agent-os-dashboard
    restart: unless-stopped
    environment:
      - NANOBOT_API_URL=http://nanobot:8900
      - DOCKER_HOST_URL=http://localhost:2375
      - HERMES_UID=10000
      - HERMES_GID=10000
    volumes:
      - hermes-home:/opt/data
      # Docker socket — needed for /api/docker/* proxy to reach host Docker
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9119:9119"
    depends_on:
      nanobot:
        condition: service_healthy

volumes:
  nanobot-workspace:
  hermes-home:
