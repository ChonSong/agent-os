---
# agent-os — nanobot agent core + dashboard, bundled in one container
services:
  agent-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-os
    restart: unless-stopped
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_KEYB=${MINIMAX_API_KEYB}
      - NANOBOT_API_URL=http://localhost:8900
      - PORT=9120
    volumes:
      - nanobot-workspace:/opt/data/home/.nanobot/workspace
      - hermes-home:/opt/data
      # Docker socket — gives Hermes Agent (or this container) host Docker control
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9120:9120"
      - "8900:8900"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9120/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  nanobot-workspace:
  hermes-home:
