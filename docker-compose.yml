services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: agent-os-hermes
    restart: unless-stopped
    mem_limit: 2g
    cpus: 2.0
    command: ["gateway", "run"]
    ports:
      - "127.0.0.1:8642:8642"
      - "127.0.0.1:9119:9119"
    environment:
      - HERMES_UID=1000
      - HERMES_GID=1000
      - HERMES_HOME=/opt/data
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
    volumes:
      - /home/sean/.hermes:/opt/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8642/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - agent-net

  backend:
    image: ghcr.io/chonsong/agent-os:latest
    container_name: agent-os-backend
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    command: ["backend"]
    ports:
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:1331:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://agentos:agentos_secure_pg_pass_2026@postgres:5432/agentos
      HERMES_API_URL: http://hermes:8642
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DEPLOY_TOKEN: ${DEPLOY_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /home/sean/.hermes/agent-os:/opt/agent-os:ro
      - /home/sean/.nanobot:/root/.nanobot:rw
      - /opt/data:/opt/data:rw
      - /home/sean:/home/sean:rw
      - /home/sean/.hermes/agent-os-patched/frontend-dist:/app/apps/dashboard/frontend/dist:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/api/db/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      hermes:
        condition: service_healthy
    networks:
      - agent-net

  postgres:
    image: postgres:16-alpine
    container_name: agent-os-postgres
    restart: unless-stopped
    mem_limit: 7.5g
    cpus: 0.5
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_secure_pg_pass_2026
      POSTGRES_DB: agentos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agent-net

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    container_name: agent-os-cloudflared
    restart: unless-stopped
    mem_limit: 1g
    cpus: 0.25
    command: ["tunnel", "run", "--token-file", "/etc/cloudflared/agent-os-argo-token.txt", "--url", "http://backend:3001"]
    volumes:
      - /home/sean/.cloudflared/agent-os-argo-token.txt:/etc/cloudflared/agent-os-argo-token.txt:ro
    networks:
      - agent-net
    depends_on:
      backend:
        condition: service_healthy

  webhook-emitter:
    image: ghcr.io/chonsong/agent-os:latest
    container_name: agent-os-webhook-emitter
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.1
    read_only: true
    tmpfs: /tmp:size=32m,mode=755
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://backend:3001/api/db/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["webhook-emitter", "run", "--webhook-url", "http://backend:3001/api/webhooks/casaos", "--poll-interval", "10", "--filter", "agent-os-"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  postgres-data:
