version: "3.9"

services:
  # ── Agent services (multi-stage Dockerfile) ───────────────────────────────
  nanobot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/chonsong/agent-os:latest
    container_name: agent-os-nanobot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8900:8900"
    environment:
      NANOBOT_WORKSPACE: /workspace
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      MINIMAX_API_BASE: "${MINIMAX_API_BASE:-https://api.minimax.chat}"
    volumes:
      - nanobot-workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-net

  # ── Dashboard: Express backend (port 3001) + serves frontend static ───────
  dashboard-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/chonsong/agent-os:latest
    container_name: agent-os-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      NANOBOT_URL: http://nanobot:8900
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentos}:${POSTGRES_PASSWORD:-agentos}@postgres:5432/${POSTGRES_DB:-agentos}
    depends_on:
      nanobot:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - agent-net

  # ── Postgres (local dev) ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agent-os-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-agentos_secure_pg_pass_2026}"
      POSTGRES_DB: agentos
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos -d agentos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-net

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agent-os-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard-backend
    networks:
      - agent-net

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: agent-os-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    networks:
      - agent-net
    depends_on:
      - nginx

networks:
  agent-net:
    driver: bridge

volumes:
  nanobot-workspace:
  postgres-data:
