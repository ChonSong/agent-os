version: "3.9"

services:
  nanobot:
    image: ghcr.io/chonsong/agent-os/nanobot:latest
    container_name: agent-os-nanobot
    restart: unless-stopped
    ports:
      - "127.0.0.1:8900:8900"
    environment:
      NANOBOT_WORKSPACE: /workspace
      MINIMAX_API_KEY: "${MINIMAX_API_KEY}"
      MINIMAX_API_BASE: "${MINIMAX_API_BASE:-https://api.minimax.chat}"
    volumes:
      - nanobot-workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-net

  dashboard:
    image: ghcr.io/chonsong/agent-os/dashboard:latest
    container_name: agent-os-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://localhost:3001
      NANOBOT_URL: http://nanobot:8900
    depends_on:
      nanobot:
        condition: service_healthy
    networks:
      - agent-net

  nginx:
    image: nginx:alpine
    container_name: agent-os-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - /home/sean/.hermes/agent-os/infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard
    networks:
      - agent-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: agent-os-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    networks:
      - agent-net
    depends_on:
      - nginx

networks:
  agent-net:
    driver: bridge

volumes:
  nanobot-workspace:
