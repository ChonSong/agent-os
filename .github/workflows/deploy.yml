name: Release Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. latest, sha-abc123)'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set image tag
        id: vars
        run: |
          TAG="${{ inputs.image_tag || 'latest' }}"
          if [[ "$TAG" == "latest" ]]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push nanobot
        uses: docker/build-push-action@v5
        with:
          context: ./packages/nanobot
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/nanobot:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository }}/nanobot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./apps/dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/dashboard:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ github.repository }}/dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: sean
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/.hermes/agent-os
            git pull origin main
            docker compose pull
            docker compose up -d
            docker image prune -f
