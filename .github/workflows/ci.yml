name: CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/**'
      - '*.json'
      - '*.yaml'
      - '*.yml'
      - '*.toml'
      - 'turbo.json'
      - 'tsconfig*.json'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/**'
      - '*.json'
      - '*.yaml'
      - '*.yml'
      - '*.toml'
      - 'turbo.json'
      - 'tsconfig*.json'

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: github

jobs:
  # ── Python ────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find Python packages
        id: find-python
        run: |
          HAS_PY=$(find packages -name "pyproject.toml" -not -path "*/node_modules/*" | head -1 || echo "")
          echo "found=$HAS_PY" >> $GITHUB_OUTPUT

      - name: Install Python packages
        if: steps.find-python.outputs.found != ''
        run: |
          pip install -e packages/nanobot
          pip install -e packages/observability -e packages/agent-adapter
          pip install ruff pytest pytest-asyncio pytest-cov mypy

      - name: Lint Python
        if: steps.find-python.outputs.found != ''
        run: |
          ruff check packages/

      - name: Type-check Python
        if: steps.find-python.outputs.found != ''
        run: |
          mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - name: Test Python
        if: steps.find-python.outputs.found != ''
        run: |
          pytest packages/ --cov=packages/ --cov-report=xml

  # ── Node / TypeScript ──────────────────────────────────────
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find Node packages
        id: find-node
        run: |
          HAS_NODE=$(find apps packages -name "package.json" -not -path "*/node_modules/*" | head -1 || echo "")
          echo "found=$HAS_NODE" >> $GITHUB_OUTPUT

      - name: Install
        if: steps.find-node.outputs.found != ''
        run: npm ci

      - name: Build
        if: steps.find-node.outputs.found != ''
        run: npx turbo build --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend

      - name: Test
        if: steps.find-node.outputs.found != ''
        run: npx turbo test --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend

      - name: Lint
        if: steps.find-node.outputs.found != ''
        run: npx turbo lint --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend

  # ── Go ─────────────────────────────────────────────────────
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Find Go packages
        id: find-go
        run: |
          HAS_GO=$(find infra -name "go.mod" -not -path "*/node_modules/*" | head -1 || echo "")
          echo "found=$HAS_GO" >> $GITHUB_OUTPUT

      - name: Build Go
        if: steps.find-go.outputs.found != ''
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -f "$dir/go.mod" ]; then
              (cd "$dir" && go build ./...)
            fi
          done

      - name: Vet Go
        if: steps.find-go.outputs.found != ''
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -f "$dir/go.mod" ]; then
              (cd "$dir" && go vet ./...)
            fi
          done

      - name: Test Go
        if: steps.find-go.outputs.found != ''
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -f "$dir/go.mod" ]; then
              (cd "$dir" && go test ./...)
            fi
          done
