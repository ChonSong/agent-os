name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: github

jobs:
  # ── Python ────────────────────────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Find Python packages
        id: find-python
        run: |
          HAS_PY=$(find packages -name "pyproject.toml" -not -path "*/node_modules/*" | head -1 || echo "")
          echo "found=$HAS_PY" >> $GITHUB_OUTPUT
          echo "Packages found: $HAS_PY"

      - name: Install Python packages
        if: steps.find-python.outputs.found != ''
        run: |
          pip install -e packages/observability -e packages/agent-adapter || true
          pip install ruff pytest pytest-asyncio pytest-cov mypy

      - name: Lint Python
        if: steps.find-python.outputs.found != ''
        run: |
          ruff check packages/ || true

      - name: Type-check Python
        if: steps.find-python.outputs.found != ''
        run: |
          mypy packages/ || true

      - name: Test Python
        if: steps.find-python.outputs.found != ''
        run: |
          pytest packages/ --cov=packages/ --cov-report=xml || true

  # ── Node / TypeScript ──────────────────────────────────────
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find Node packages
        id: find-node
        run: |
          HAS_NODE=$(find apps packages -name "package.json" -not -path "*/node_modules/*" | head -1 || echo "")
          echo "found=$HAS_NODE" >> $GITHUB_OUTPUT

      - name: Install
        if: steps.find-node.outputs.found != ''
        run: npm ci

      - name: Build
        if: steps.find-node.outputs.found != ''
        run: npx turbo build --filter='./apps/dashboard/...' || true

      - name: Test
        if: steps.find-node.outputs.found != ''
        run: npx turbo test --filter='./apps/dashboard/...' || true

      - name: Lint
        if: steps.find-node.outputs.found != ''
        run: npx turbo lint --filter='./apps/dashboard/...' || true

  # ── Go ─────────────────────────────────────────────────────
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Find Go packages
        id: find-go
        run: |
          HAS_GO=$(find infra -name "go.mod" -not -path "*/node_modules/*" | head -1 || echo "")
          echo "found=$HAS_GO" >> $GITHUB_OUTPUT

      - name: Build Go
        if: steps.find-go.outputs.found != ''
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -f "$dir/go.mod" ]; then
              (cd "$dir" && go build ./... || true)
            fi
          done

      - name: Test Go
        if: steps.find-go.outputs.found != ''
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -f "$dir/go.mod" ]; then
              (cd "$dir" && go test ./... || true)
            fi
          done
