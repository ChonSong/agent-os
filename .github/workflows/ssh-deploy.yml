name: SSH Deploy to Server

on:
  workflow_dispatch:
    inputs:
      host:
        description: 'Server IP or hostname'
        required: true
        default: ''
      user:
        description: 'SSH user'
        required: false
        default: 'root'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ inputs.host || secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          HOST=${{ inputs.host || secrets.DEPLOY_HOST }}
          USER=${{ inputs.user || secrets.DEPLOY_USER }}
          echo "Connecting to ${USER}@${HOST}"
          
          # Pull latest images
          ssh "${USER}@${HOST}" "cd /opt/data/hermes-sync/projects/agent-os && \
            docker compose pull && \
            docker compose up -d --remove-orphans && \
            docker image prune -f"
          
          echo "Deploy complete"
