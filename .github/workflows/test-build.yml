name: Test Build
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker info
        run: |
          docker version
          docker buildx version
          docker buildx ls

      - name: Build
        run: |
          docker build --load -t test:latest .

      - name: Check image
        run: |
          docker images test:latest
          echo "Build succeeded!"
