name: Build and SSH Deploy

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.nanobot'
      - 'Dockerfile.dashboard'
      - 'packages/nanobot/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build step (use existing images)'
        required: false
        default: 'false'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: inputs.skip_build != 'true'
    outputs:
      nanobot_tag: ${{ steps.meta-nanobot.outputs.tags }}
      dashboard_tag: ghcr.io/${{ github.repository_owner }}/agent-os-dashboard:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (nanobot)
        id: meta-nanobot
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-os-nanobot
          tags: |
            type=sha,format=long
            type=ref,event=branch

      - name: Build nanobot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nanobot
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-nanobot.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-os-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/agent-os-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          DOCKER_IMAGE_TAG: ${{ needs.build.outputs.dashboard_tag }}
        run: |
          HOST=${{ secrets.DEPLOY_HOST }}
          USER=${{ secrets.DEPLOY_USER || 'root' }}
          echo "Deploying to ${USER}@${HOST}"
          
          ssh "${USER}@${HOST}" << 'REMOTE_COMMANDS'
          set -e
          cd /opt/data/hermes-sync/projects/agent-os
          
          # Update compose file to use specific SHA tag
          DOCKER_IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/agent-os-dashboard:${{ github.sha }}"
          NANOBOT_TAG="${{ needs.build.outputs.nanobot_tag }}"
          
          # Pull latest
          docker compose pull
          
          # Tag nanobot image if needed
          docker pull "${DOCKER_IMAGE_TAG}"
          
          # Restart services
          docker compose up -d --remove-orphans
          
          # Prune old images
          docker image prune -f
          
          echo "Deploy complete at $(date)"
          docker ps --filter "name=agent-os" --format "table {{.Names}}\t{{.Status}}"
          REMOTE_COMMANDS
