name: Build and SSH Deploy

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'packages/nanobot/**'
      - 'apps/dashboard/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build step (use existing images)'
        required: false
        default: 'false'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: inputs.skip_build != 'true'
    outputs:
      image_tag: ghcr.io/${{ github.repository_owner }}/agent-os:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-os
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          HOST=${{ secrets.DEPLOY_HOST }}
          USER=${{ secrets.DEPLOY_USER || 'root' }}
          echo "Deploying to ${USER}@${HOST}"

          ssh "${USER}@${HOST}" << 'REMOTE_COMMANDS'
          set -e
          cd /opt/data/hermes-sync/projects/agent-os

          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/agent-os:${{ github.sha }}"

          # Pull new image
          docker pull "${IMAGE_TAG}"

          # Update compose to use the SHA tag
          sed -i "s|image:.*agent-os.*|image: ${IMAGE_TAG}|" docker-compose.yml 2>/dev/null || true

          # Stop old containers
          docker compose down || true

          # Start new
          docker compose up -d

          # Prune old images
          docker image prune -f

          echo "Deploy complete at $(date)"
          docker ps --filter "name=agent-os" --format "table {{.Names}}\t{{.Status}}"
          REMOTE_COMMANDS
