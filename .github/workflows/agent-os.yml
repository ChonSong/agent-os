name: Build and Push Agent OS (Unified)

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'apps/dashboard/**'
      - 'packages/nanobot/**'
      - 'packages/agent-adapter/**'
      - 'packages/observability/**'
      - 'docker-compose.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/agent-os:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/agent-os:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/agent-os:latest
          cache-to: type=inline
