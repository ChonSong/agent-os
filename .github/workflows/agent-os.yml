name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: github

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Language Tests ─────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            lang: python
          - runner: ubuntu-latest
            lang: node
          - runner: ubuntu-latest
            lang: go

    steps:
      - uses: actions/checkout@v4

      # Python
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - if: matrix.lang == 'python'
        run: pip install -e packages/nanobot -e packages/observability -e packages/agent-adapter ruff pytest pytest-asyncio pytest-cov mypy

      - if: matrix.lang == 'python'
        run: ruff check packages/

      - if: matrix.lang == 'python'
        run: mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - if: matrix.lang == 'python'
        run: pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml

      # Node
      - if: matrix.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - if: matrix.lang == 'node'
        run: npm install

      - if: matrix.lang == 'node'
        run: npx turbo build --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend

      - if: matrix.lang == 'node'
        run: npx turbo test --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend || true

      - if: matrix.lang == 'node'
        run: npx turbo lint --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend || true

      # Go
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -f "$dir/go.mod" ]; then
              (cd "$dir" && go build ./... && go vet ./... && go test ./...)
            fi
          done

  # ── Docker Build & Push ────────────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_sha: ghcr.io/chonsong/agent-os:${{ github.sha }}
      image_tag: ghcr.io/chonsong/agent-os:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/chonsong/agent-os:${{ github.sha }}
            ghcr.io/chonsong/agent-os:latest
          no-cache-fallback: true

  # ── Deploy to Server ──────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy — trigger webhook (server also polls GHCR every 60s)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "Image pushed to ghcr.io/chonsong/agent-os:latest"
          echo "DEPLOY_HOST configured: ${DEPLOY_HOST:0:4}..."
          if [ -n "$DEPLOY_HOST" ] && [ "$DEPLOY_HOST" != "null" ]; then
            echo "Attempting webhook trigger at ${DEPLOY_HOST}..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://${DEPLOY_HOST}/api/deploy" \
              -H "Content-Type: text/plain" \
              -d '${{ secrets.DEPLOY_TOKEN }}' 2>/dev/null || echo "000")
            echo "Webhook response: $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Deploy: immediate (webhook succeeded)"
            else
              echo "Deploy: will occur within 60s (server polls GHCR)"
            fi
          else
            echo "DEPLOY_HOST not configured — server will auto-update via GHCR polling within 60s"
          fi
