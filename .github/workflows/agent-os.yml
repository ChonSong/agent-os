name: Agent OS

on:
  push:
    branches: [main]
    paths:
      - '**'
      - '!.github/workflows/**'
      - '!.vscode/**'
      - '!.devcontainer/**'
      - 'docs/**'
      - '**.md'
      - 'README.md'
      - '.gitignore'
      - 'LICENSE'
      - 'Makefile'
      - 'docker-compose*.yml'
      - 'Dockerfile*'
      - '!.github'
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: github

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── All tests in one job (avoids parallel runner resource contention) ───────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -e packages/nanobot -e packages/observability -e packages/agent-adapter ruff pytest pytest-asyncio pytest-cov mypy

      - run: ruff check packages/

      - run: mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - run: pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml

      # Node
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install
        working-directory: .

      - run: npx turbo build --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

      - run: npx turbo test --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

      - run: npx turbo lint --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

      # Go
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: '**/go.sum'

      - run: go version

      - run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            (cd "$dir" && go build ./... && go test -timeout 5m -p 2 ./...) || exit 1
          done

  # ── Docker Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=sha,prefix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }},ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max

      - name: Save image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload image tag
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: $GITHUB_OUTPUT

  # ── Deploy (informational — server polls GHCR) ─────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify deploy available
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Server will pick up new image within 60 seconds (GHCR polling cron)"
