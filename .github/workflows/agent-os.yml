name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TURBO_TOKEN: ''
  TURBO_TEAM: ''

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Test (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [go, python]
    steps:
      - uses: actions/checkout@v4
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '~1.23'
          cache: false
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Env info
        run: |
          echo "=== Node ===" && node --version
          echo "=== npm ===" && npm --version
          echo "=== Python ===" && python --version
          if [ "${{ matrix.lang }}" = "go" ]; then go version; fi
      - name: Install deps (Go)
        if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -d "$dir" ]; then
              echo "Building $dir..."
              (cd "$dir" && go build ./... 2>&1 | tail -3)
            fi
          done
      - name: Install deps (Python)
        if: matrix.lang == 'python'
        run: |
          pip install -e packages/nanobot -e packages/observability ruff pytest pytest-asyncio pytest-cov mypy
          ruff check packages/
          mypy packages/ --config-file=pyproject.toml --follow-imports=skip
          pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml || true

  test-node:
    name: Test (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Env info
        run: |
          node --version && npm --version
          echo "=== Cache info ==="
          echo "TURBO_TOKEN set: ${{ env.TURBO_TOKEN != '' }}"
      - name: Install
        run: npm install --workspaces --include=dev
      - name: Type check backend
        run: cd apps/dashboard/backend && npx --yes tsc --noEmit
      - name: Lint
        run: npm run lint --workspace=@agent-os/dashboard-frontend
      - name: Test
        run: npm test --workspace=@agent-os/dashboard-frontend
      - name: Test backend
        run: npm test --workspace=@agent-os/dashboard-backend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-core, test-node]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker info
        run: |
          docker version --format '{{.Server.Version}}'
          docker buildx version

      - name: Build
        run: |
          repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          docker build --load -t ghcr.io/${repo_lower}:${{ github.sha }} .
          docker images ghcr.io/${repo_lower}:${{ github.sha }}

      - name: Push
        run: |
          repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${repo_lower}:${{ github.sha }}
          docker tag ghcr.io/${repo_lower}:${{ github.sha }} ghcr.io/${repo_lower}:latest
          docker push ghcr.io/${repo_lower}:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        run: |
          echo "Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Server polls GHCR — no webhook needed"
