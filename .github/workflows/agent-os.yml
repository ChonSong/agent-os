name: Build and Push Agent OS Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.nanobot'
      - 'packages/nanobot/**'
      - 'docker-compose.yml'
      - '.github/workflows/agent-os.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (nanobot)
        id: meta-nanobot
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-os-nanobot
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build nanobot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nanobot
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-nanobot.outputs.tags }}
          labels: ${{ steps.meta-nanobot.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log Docker Hub (for hermes-agent image pulls)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build dashboard (from published hermes-agent + api_proxies overlay)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/chonsong/agent-os-dashboard:latest
            ghcr.io/chonsong/agent-os-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
