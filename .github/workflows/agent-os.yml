name: Build and Push Agent OS (Unified)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/agent-os.yml'
      - 'Dockerfile'
      - 'apps/dashboard/**'
      - 'packages/nanobot/**'
      - 'packages/agent-adapter/**'
      - 'packages/observability/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GHCR access
        shell: bash
        run: |
          echo "FROM scratch" | docker buildx build --tag "ghcr.io/chonsong/agent-os:probe-test" --push -
          echo "Exit: $?"

      - name: Build and push
        shell: bash
        run: |
          echo "=== Docker version ==="
          docker --version
          echo "=== Buildx version ==="
          docker buildx version
          echo "=== Build context ==="
          ls -la
          echo "=== Dockerfile ==="
          cat Dockerfile | head -20
          echo "=== Build start ==="
          docker buildx build \
            --platform linux/amd64 \
            --tag "ghcr.io/chonsong/agent-os:${{ github.sha }}" \
            --tag "ghcr.io/chonsong/agent-os:latest" \
            --file ./Dockerfile \
            --push \
            .
