name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: github

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Language Tests ─────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            lang: python
          - runner: ubuntu-latest
            lang: node
          - runner: ubuntu-latest
            lang: go

    steps:
      - uses: actions/checkout@v4

      # Python
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - if: matrix.lang == 'python'
        run: pip install -e packages/nanobot -e packages/observability -e packages/agent-adapter ruff pytest pytest-asyncio pytest-cov mypy

      - if: matrix.lang == 'python'
        run: ruff check packages/

      - if: matrix.lang == 'python'
        run: mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - if: matrix.lang == 'python'
        run: pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml

      # Node
      - if: matrix.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - if: matrix.lang == 'node'
        run: npm install

      - if: matrix.lang == 'node'
        run: npx turbo build --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

      - if: matrix.lang == 'node'
        run: npx turbo test --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

      - if: matrix.lang == 'node'
        run: npx turbo lint --filter=@agent-os/dashboard-frontend --filter=@agent-os/dashboard-backend
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

      # Go
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: '**/go.sum'

      - if: matrix.lang == 'go'
        run: go version

      - if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            (cd "$dir" && go build ./... && go test -timeout 8m -p 2 ./...) || exit 1
          done

  # ── Docker Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=sha,prefix=,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }},ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha,scope=main
          cache-to: type=gha,mode=max

  # ── Deploy (informational) ─────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Server polls GHCR every 60s — no webhook needed"
