name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TURBO_TOKEN: ''
  TURBO_TEAM: ''

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Test (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [go, python]
    steps:
      - uses: actions/checkout@v4
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '~1.23'
          cache: false
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Env info
        run: |
          echo "=== Node ===" && node --version
          echo "=== npm ===" && npm --version
          echo "=== Python ===" && python --version
          if [ "${{ matrix.lang }}" = "go" ]; then go version; fi
      - name: Install deps (Go)
        if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            if [ -d "$dir" ]; then
              echo "Building $dir..."
              (cd "$dir" && go build ./... 2>&1 | tail -3)
            fi
          done
      - name: Install deps (Python)
        if: matrix.lang == 'python'
        run: |
          pip install -e packages/nanobot -e packages/observability ruff pytest pytest-asyncio pytest-cov mypy
          ruff check packages/
          mypy packages/ --config-file=pyproject.toml --follow-imports=skip
          pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml || true

  test-node:
    name: Test (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Env info
        run: |
          node --version && npm --version
          echo "=== Cache info ==="
          echo "TURBO_TOKEN set: ${{ env.TURBO_TOKEN != '' }}"
      - name: Install
        run: npm install --workspaces --include=dev
      - name: Type check backend
        run: cd apps/dashboard/backend && npx --yes tsc --noEmit
      - name: Lint
        run: npm run lint --workspace=@agent-os/dashboard-frontend
      - name: Test
        run: npm test --workspace=@agent-os/dashboard-frontend
      - name: Test backend
        run: npm test --workspace=@agent-os/dashboard-backend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-core, test-node]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker info
        run: |
          docker version --format '{{.Server.Version}}'
          docker buildx version

      - name: Build
        run: |
          repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          docker build --load -t ghcr.io/${repo_lower}:${{ github.sha }} .
          docker images ghcr.io/${repo_lower}:${{ github.sha }}

      - name: Push
        run: |
          repo_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${repo_lower}:${{ github.sha }}
          docker tag ghcr.io/${repo_lower}:${{ github.sha }} ghcr.io/${repo_lower}:latest
          docker push ghcr.io/${repo_lower}:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_HOST" ]; then
            echo "⚠️  DEPLOY_KEY or DEPLOY_HOST secrets not set — skipping deploy"
            echo "To enable: add DEPLOY_KEY (SSH private key) and DEPLOY_HOST (host IP) to repo secrets"
            exit 0
          fi

          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          echo "🚀 Deploying image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no sean@"$DEPLOY_HOST" << 'DEPLOY'
            set -e
            echo "Pulling latest image..."
            docker pull ghcr.io/chonsong/agent-os:latest

            echo "Recreating containers..."
            docker stop agent-os-backend agent-os-webhook-emitter 2>/dev/null || true
            docker rm agent-os-backend agent-os-webhook-emitter 2>/dev/null || true

            # Backend
            docker run -d \
              --name agent-os-backend \
              --restart unless-stopped \
              --memory 1g \
              --network agent-os_agent-net \
              --add-host host.docker.internal:host-gateway \
              -p 127.0.0.1:3001:3001 \
              -p 127.0.0.1:1331:3001 \
              -e NODE_ENV=production \
              -e PORT=3001 \
              -e "DATABASE_URL=postgresql://agentos:agentos_secure_pg_pass_2026@postgres:5432/agentos" \
              -e "HERMES_API_URL=http://host.docker.internal:8642" \
              -v /var/run/docker.sock:/var/run/docker.sock:rw \
              -v /home/sean/.hermes/agent-os:/opt/agent-os:ro \
              -v /home/sean/.nanobot:/root/.nanobot:rw \
              -v /opt/data:/opt/data:rw \
              -v /home/sean:/home/sean:rw \
              -v /home/sean/.hermes/agent-os-patched/frontend-dist:/app/apps/dashboard/frontend/dist:ro \
              --health-cmd "curl -sf http://localhost:3001/api/db/health" \
              --health-interval 15s --health-timeout 5s --health-retries 3 --health-start-period 15s \
              ghcr.io/chonsong/agent-os:latest \
              backend

            # Webhook emitter
            docker run -d \
              --name agent-os-webhook-emitter \
              --restart unless-stopped \
              --memory 256m \
              --network agent-os_agent-net \
              --health-cmd "curl -sf http://agent-os-backend:3001/api/db/health" \
              --health-interval 30s --health-timeout 5s --health-retries 3 --health-start-period 10s \
              -v /var/run/docker.sock:/var/run/docker.sock:ro \
              ghcr.io/chonsong/agent-os:latest \
              webhook-emitter run --webhook-url http://agent-os-backend:3001/api/webhooks/casaos --poll-interval 10 --filter agent-os-

            # Wait for health
            echo "Waiting for backend health check..."
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:3001/api/db/health > /dev/null 2>&1; then
                echo "✅ Backend healthy"
                break
              fi
              sleep 5
            done

            # Sync frontend dist
            docker run --rm -v /home/sean/.hermes/agent-os-patched/frontend-dist:/out --entrypoint sh ghcr.io/chonsong/agent-os:latest -c 'cp -a /app/apps/dashboard/frontend/dist/. /out/' 2>/dev/null || true

            echo "✅ Deploy complete"
          DEPLOY
