name: Build and Push Agent OS (Unified)

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'apps/dashboard/**'
      - 'packages/nanobot/**'
      - 'packages/agent-adapter/**'
      - 'packages/observability/**'
      - 'docker-compose.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (unified agent-os image)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/agent-os
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build unified agent-os image
        run: |
          echo "=== Build started at $(date) ==="
          docker buildx build \
            --progress=plain \
            --platform linux/amd64 \
            --tag ghcr.io/${{ github.repository_owner }}/agent-os:test \
            --file ./Dockerfile \
            --push \
            . 2>&1 | tee /tmp/build.log
          echo "=== Build finished at $(date) ==="
          echo "Exit code: $?"
