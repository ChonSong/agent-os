name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env: {}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python + Go tests (CPU-light, I/O-bound) ─────────────────────────────────
  test-core:
    name: Test (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: python
          - lang: go

    steps:
      - uses: actions/checkout@v4

      # Python
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - if: matrix.lang == 'python'
        run: pip install -e packages/nanobot -e packages/observability -e packages/agent-adapter ruff pytest pytest-asyncio pytest-cov mypy

      - if: matrix.lang == 'python'
        run: ruff check packages/

      - if: matrix.lang == 'python'
        run: mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - if: matrix.lang == 'python'
        run: pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml

      # Go
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: '**/go.sum'

      - if: matrix.lang == 'go'
        run: go version

      - if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            (cd "$dir" && go build ./... && go test -timeout 8m -p 2 ./...) || exit 1
          done

  # ── Node tests (CPU-heavy — run separately to avoid contention) ─────────────
  test-node:
    name: Test (node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --workspaces --include=dev

      # Build: shared-types first, then backend, then frontend
      - run: npm run build --workspace=@agent-os/shared-types
      - run: npm run build --workspace=@agent-os/dashboard-backend
      - run: npm run build --workspace=@agent-os/dashboard-frontend

      # Test & lint
      - run: npm test --workspace=@agent-os/dashboard-frontend
      - run: npm test --workspace=@agent-os/dashboard-backend
      - run: npm run lint --workspace=@agent-os/dashboard-frontend

  # ── Docker Build (load mode → artifact) ────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-core, test-node]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=sha,prefix=,format=long

      - name: Build image (load into daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact
        run: |
          tags='${{ steps.meta.outputs.tags }}'
          echo "Tags: $tags"
          primary=$(echo "$tags" | awk '{print $1}')
          echo "Primary: $primary"
          docker tag "$primary" agent-os-image
          docker save agent-os-image -o /tmp/agent-os.tar
          echo "Image saved: $(ls -lh /tmp/agent-os.tar | awk '{print $5}')"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-os-image
          path: /tmp/agent-os.tar
          retention-days: 1

  # ── Docker Push ────────────────────────────────────────────────────────────────
  push:
    name: Push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: agent-os-image
          path: /tmp/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push
        run: |
          docker load --input /tmp/agent-os.tar
          docker tag agent-os-image ghcr.io/${{ github.repository }}:${{ needs.build.outputs.sha }}
          docker push ghcr.io/${{ github.repository }}:${{ needs.build.outputs.sha }}
          docker tag agent-os-image ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest
          echo "Done!"


  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Server polls GHCR every 60s — no webhook needed"
