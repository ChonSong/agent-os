name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env: {}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python + Go tests (CPU-light, I/O-bound) ─────────────────────────────────
  test-core:
    name: Test (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: python
          - lang: go

    steps:
      - uses: actions/checkout@v4

      # Python
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - if: matrix.lang == 'python'
        run: pip install -e packages/nanobot -e packages/observability -e packages/agent-adapter ruff pytest pytest-asyncio pytest-cov mypy

      - if: matrix.lang == 'python'
        run: ruff check packages/

      - if: matrix.lang == 'python'
        run: mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - if: matrix.lang == 'python'
        run: pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml

      # Go
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: '**/go.sum'

      - if: matrix.lang == 'go'
        run: go version

      - if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            (cd "$dir" && go build ./... && go test -timeout 8m -p 2 ./...) || exit 1
          done

  # ── Node tests (CPU-heavy — run separately to avoid contention) ─────────────
  test-node:
    name: Test (node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --workspaces --include=dev

      # Build: shared-types first, then backend, then frontend
      - run: npm run build --workspace=@agent-os/shared-types
      - run: npm run build --workspace=@agent-os/dashboard-backend
      - run: npm run build --workspace=@agent-os/dashboard-frontend

      # Test & lint
      - run: npm test --workspace=@agent-os/dashboard-frontend
      - run: npm test --workspace=@agent-os/dashboard-backend
      - run: npm run lint --workspace=@agent-os/dashboard-frontend

  # ── Docker Build (load mode → artifact) ────────────────────────────────────────
  # ── Docker Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-core, test-node]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    outputs:
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker info
        run: |
          echo "=== Docker ==="
          docker version --format '{{.Server.Version}}'
          echo ""
          echo "=== Buildx ==="
          docker buildx version
          echo ""
          echo "=== BuildKit ==="
          docker buildx ls
          echo ""
          echo "=== Build args ==="
          echo "context: ."
          echo "cache-from: type=gha"
          echo "cache-to: type=gha,mode=max"

      - name: Build
        run: |
          echo "=== Starting build at $(date) ==="
          set -x
          docker build \
            --tag agent-os-test:latest \
            --load \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --progress=plain \
            .
          set +x
          echo "=== Build done at $(date) ==="
          echo "=== Image info ==="
          docker images agent-os-test:latest
          echo "=== Tag for GHCR ==="
          docker tag agent-os-test:latest ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker images ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Push to GHCR (primary: sha tag)
        run: |
          echo "Logging in to GHCR..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "Tagging and pushing SHA tag..."
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          echo "SHA tag pushed successfully"

      - name: Push latest tag (best effort)
        run: |
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest || echo "latest tag push failed (non-fatal)"


  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Server polls GHCR every 60s — no webhook needed"
