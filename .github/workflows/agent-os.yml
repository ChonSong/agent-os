name: Agent OS

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

env: {}

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python + Go tests (CPU-light, I/O-bound) ─────────────────────────────────
  test-core:
    name: Test (${{ matrix.lang }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - lang: python
          - lang: go

    steps:
      - uses: actions/checkout@v4

      # Python
      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - if: matrix.lang == 'python'
        run: pip install -e packages/nanobot -e packages/observability -e packages/agent-adapter ruff pytest pytest-asyncio pytest-cov mypy

      - if: matrix.lang == 'python'
        run: ruff check packages/

      - if: matrix.lang == 'python'
        run: mypy packages/ --config-file=pyproject.toml --follow-imports=skip

      - if: matrix.lang == 'python'
        run: pytest packages/ --ignore=packages/nanobot/tests --cov=packages/ --cov-report=xml

      # Go
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: '**/go.sum'

      - if: matrix.lang == 'go'
        run: go version

      - if: matrix.lang == 'go'
        run: |
          for dir in infra/CasaOS/agent infra/CasaOS/webhook-emitter; do
            (cd "$dir" && go build ./... && go test -timeout 8m -p 2 ./...) || exit 1
          done

  # ── Node tests (CPU-heavy — run separately to avoid contention) ─────────────
  test-node:
    name: Test (node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install --workspaces --include=dev

      # Build: shared-types first, then backend, then frontend
      - run: npm run build --workspace=@agent-os/shared-types
      - run: npm run build --workspace=@agent-os/dashboard-backend
      - run: npm run build --workspace=@agent-os/dashboard-frontend

      # Test & lint
      - run: npm test --workspace=@agent-os/dashboard-frontend
      - run: npm test --workspace=@agent-os/dashboard-backend
      - run: npm run lint --workspace=@agent-os/dashboard-frontend

  # ── Docker Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-core, test-node]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - name: Diagnostics
        run: |
          echo "=== Docker version ==="
          docker version
          echo ""
          echo "=== Disk space ==="
          df -h /
          echo ""
          echo "=== Docker info ==="
          docker info 2>&1 | head -20

      - name: Set up Docker Buildx
        run: docker setup-buildx --bootstrap 2>&1 | tail -5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin 2>&1 | tail -2

      - name: Extract metadata
        run: |
          echo "tags=ghcr.io/${{ github.repository }}:${{ github.sha }},ghcr.io/${{ github.repository }}:latest" >> "$GITHUB_OUTPUT"
          echo "labels=org.opencontainers.image.source=https://github.com/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          echo "Building image..."
          docker build \
            --tag "ghcr.io/${{ github.repository }}:${{ github.sha }}" \
            --tag "ghcr.io/${{ github.repository }}:latest" \
            .

          echo "Pushing SHA tag..."
          docker push "ghcr.io/${{ github.repository }}:${{ github.sha }}" --quiet || { echo "SHA push failed!"; exit 1; }

          echo "Pushing latest tag..."
          docker push "ghcr.io/${{ github.repository }}:latest" --quiet || { echo "latest push failed!"; exit 1; }

          echo "Verifying SHA tag exists..."
          for i in 1 2 3 4 5; do
            if docker manifest inspect "ghcr.io/${{ github.repository }}:${{ github.sha }}" > /dev/null 2>&1; then
              echo "SHA tag verified!"
              break
            fi
            echo "Waiting for registry to index... ($i/5)"
            sleep 2
          done

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notify
        run: |
          echo "Image pushed: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Server polls GHCR every 60s — no webhook needed"
