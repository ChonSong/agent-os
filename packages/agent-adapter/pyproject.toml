[project]
name = "agent-os-agent-adapter"
version = "0.0.0"
description = "Agent-agnostic interface for agent-os"
requires-python = ">=3.11"

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0,<10.0.0",
    "pytest-asyncio>=1.3.0,<2.0.0",
    "ruff>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent_adapter"]

[tool.ruff]
line-length = 100
